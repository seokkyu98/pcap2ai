# Render Blueprint — 리포지토리 루트에 두면 Render가 자동 인식합니다.
# (Render 대시보드에서 "New +" → "Blueprint" → 이 리포지토리 선택)
services:
  - type: web
    name: pcap2ai-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: MAX_UPLOAD_BYTES
        value: "104857600"
      # 커스텀 도메인 연결 후 아래 주석을 해제하고 실제 도메인을 입력하세요.
      # - key: FRONTEND_ORIGINS
      #   value: https://your-domain.com,https://www.your-domain.com
