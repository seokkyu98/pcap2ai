# Render Blueprint — 리포지토리 루트에 두면 Render가 자동 인식합니다.
# (Render 대시보드에서 "New +" → "Blueprint" → 이 리포지토리 선택)
services:
  - type: web
    name: pcap2ai-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: MAX_UPLOAD_BYTES
        value: "104857600"
      # pcap2ai.com / www.pcap2ai.com은 backend/main.py의 CORS 정규식에 이미
      # 하드코딩되어 있어 기본값만으로 동작합니다. 스테이징 도메인 등 추가로
      # 허용할 출처가 생기면 아래 주석을 해제하고 콤마로 구분해 입력하세요.
      # - key: FRONTEND_ORIGINS
      #   value: https://staging.pcap2ai.com
